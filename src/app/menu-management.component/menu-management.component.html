<div class="menu-management-container">
  <div class="header">
    <h2>Menu Management</h2>
    <button mat-raised-button color="primary" (click)="addNewItem()">
      <mat-icon>add</mat-icon>
      Add New Menu Item
    </button>
  </div>

  <table mat-table [dataSource]="menuItems" class="menu-items-table">
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Name</th>
      <td mat-cell *matCellDef="let item">{{ item.name }}</td>
    </ng-container>

    <ng-container matColumnDef="price">
      <th mat-header-cell *matHeaderCellDef>Price</th>
      <td mat-cell *matCellDef="let item">{{ item.price | currency }}</td>
    </ng-container>

    <ng-container matColumnDef="promoPrice">
      <th mat-header-cell *matHeaderCellDef>Promo Price</th>
      <td mat-cell *matCellDef="let item">{{ item.promoPrice | currency }}</td>
    </ng-container>

    <ng-container matColumnDef="active">
      <th mat-header-cell *matHeaderCellDef>Active</th>
      <td mat-cell *matCellDef="let item">
        <mat-slide-toggle [checked]="item.active" (change)="toggleActive(item.id)"></mat-slide-toggle>
      </td>
    </ng-container>

    <ng-container matColumnDef="promo">
      <th mat-header-cell *matHeaderCellDef>Promo</th>
      <td mat-cell *matCellDef="let item">
        <mat-slide-toggle [checked]="item.promo" (change)="togglePromo(item.id)"></mat-slide-toggle>
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let item">
        <button mat-icon-button color="primary" (click)="editItem(item.id)">
          <mat-icon>edit</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="; columns: displayedColumns;"></tr>
  </table>
</div>
